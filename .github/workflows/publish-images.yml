name: Publish devcontainer images
on:
  push:
    branches: [main]
    paths:
      - '.devcontainer/base/**'
      - '.devcontainer/gateway/**'
      - '.github/workflows/publish-images.yml'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: o3s-base
            context: .devcontainer/base
          - name: o3s-gateway
            context: .devcontainer/gateway
    steps:
      # check out the repo so the build has the Dockerfiles and gateway scripts
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      # enable the buildx container driver required for SBOM and provenance
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      # authenticate to GHCR so the images can be pushed
      - uses: docker/login-action@abd2ef45e78c5afb21d64d4ca52ee8550d9572c7 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # derive the image name and tags plus OCI labels
      - id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        with:
          images: ghcr.io/hansehart/${{ matrix.name }}
          tags: |
            type=raw,value=latest
            type=sha

      # build each image and push it to GHCR with SBOM and provenance
      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: ${{ matrix.context }}
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true
