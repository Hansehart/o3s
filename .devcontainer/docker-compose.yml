# Stack name
name: o3s

# Cage network identity
x-cage-subnet: &cage_subnet 10.10.0.0/24
x-gateway-ip: &gateway_ip 10.10.0.2

# Apps deployed by stack
services:
  # Sole path to the internet for the dev container.
  gateway:
    build:
      context: ./gateway
    image: o3s-gateway:latest
    container_name: o3s-gateway
    # Required to manage iptables/ipset and route/NAT the cage network
    cap_add:
      - NET_ADMIN
      - NET_RAW
    # Deny privilege escalation via setuid binaries
    security_opt:
      - no-new-privileges:true
    sysctls:
      - net.ipv4.ip_forward=1
    # Cage identity: the gateway locates its cage/egress interfaces from this
    environment:
      GW_CAGE_IP: *gateway_ip
    # The allowlist is the single source of truth, read-only to the gateway
    volumes:
      - ./config/allowlist.txt:/config/allowlist.txt:ro
    networks:
      cage:
        ipv4_address: *gateway_ip
      egress:
    restart: unless-stopped
    healthcheck:
      # Resolve an allow-listed host through dnsmasq and open a real connection
      test: ["CMD", "healthcheck.sh"]
      # Probe fast during startup so the dev container's service_healthy gate clears in seconds
      # Once healthy, re-check rarely
      start_interval: 3s
      start_period: 30s
      interval: 10m
      timeout: 5s
      retries: 3

  o3s:
    build:
      context: ./workspace
      dockerfile: Dockerfile
    image: o3s:latest
    container_name: o3s
    environment:
      # Egress firewall gateway
      GATEWAY_IP: *gateway_ip

    env_file: .env
    volumes:
      # Host mount for dynamic changes
      - ../:/home/ubuntu/o3s
      # Configuration for tools
      - o3s-config:/home/ubuntu/config
      # Volume mount for project to work with across sessions
      - o3s-projects:/home/ubuntu/projects
    # Limit ressource usage
    deploy:
      resources:
        limits:
          memory: ${MEMORY_LIMIT}
          cpus: ${CPU_LIMIT}
        #reservations:
        #  devices:
        #    - driver: nvidia
        #      count: all
        #      capabilities: [gpu]
    # Required by Docker-in-Docker
    cap_add:
      - NET_ADMIN
    # Deny privilege escalation via setuid binaries
    security_opt:
      - no-new-privileges:true
    # Route egress through the gateway at container start and keep the container alive.
    command: bash -c 'ip route replace default via "$$GATEWAY_IP" || true; exec sleep infinity'
    # Its sole exit is the gateway
    networks:
      - cage
    # Wait until the gateway is routing before this container starts
    depends_on:
      gateway:
        condition: service_healthy
    # Resolve through the gateway's dnsmasq (this populates the allowlist)
    dns:
      - *gateway_ip

networks:
  # Only the gateway (which NATs via its own egress interface) can reach the internet
  cage:
    name: o3s-cage
    driver: bridge
    driver_opts:
      com.docker.network.bridge.enable_ip_masquerade: "false"
    ipam:
      config:
        - subnet: *cage_subnet
  # Gateway's own path to the internet
  egress:
    name: o3s-egress

volumes:
  o3s-config:
    name: o3s-config
  o3s-projects:
    name: o3s-projects
