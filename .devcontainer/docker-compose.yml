# Stack name
name: o3s

# Cage network identity
x-cage-subnet: &cage_subnet 10.10.0.0/24
x-gateway-ip: &gateway_ip 10.10.0.2

# Apps deployed by stack
services:
  # Sole path to the internet for the dev container.
  gateway:
    build:
      context: ./gateway
    image: o3s-gateway:latest
    container_name: o3s-gateway
    # Required to manage iptables/ipset and route/NAT the cage network
    cap_add:
      - NET_ADMIN
      - NET_RAW
    sysctls:
      - net.ipv4.ip_forward=1
    # Cage identity: the gateway locates its cage/egress interfaces from this
    environment:
      GW_CAGE_IP: *gateway_ip
    # Allowlists are the single source of truth, read-only to the gateway
    volumes:
      - ./allowed-domains.txt:/config/allowed-domains.txt:ro
      - ./allowed-ssh.txt:/config/allowed-ssh.txt:ro
    networks:
      cage:
        ipv4_address: *gateway_ip
      egress:
    restart: unless-stopped
    healthcheck:
      # Resolve an allow-listed host through dnsmasq and open TCP:443 (DNS would pass)
      test: ["CMD", "healthcheck.sh"]
      # Probe fast during startup so the dev container's service_healthy gate clears in seconds
      # Once healthy, re-check rarely
      start_interval: 3s
      start_period: 30s
      interval: 10m
      timeout: 5s
      retries: 3

  o3s:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        INSTALL_CHROME: ${INSTALL_CHROME:-false}
        INSTALL_CLAUDE: ${INSTALL_CLAUDE:-false}
        INSTALL_CODEX: ${INSTALL_CODEX:-false}
        INSTALL_LATEX: ${INSTALL_LATEX:-false}
        INSTALL_UV: ${INSTALL_UV:-false}
    image: o3s:latest
    container_name: o3s
    environment: 
      # Egress firewall gateway
      GATEWAY_IP: *gateway_ip

      # Codex
      CODEX_HOME: /home/codespace/config/codex

      # Claude
      CLAUDE_CONFIG_DIR: /home/codespace/config/claude
      # Disable unneccesary claude network traffic
      CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: "1"
      DISABLE_GROWTHBOOK: "1"

      # UV
      UV_PYTHON_PREFERENCE: only-managed
      UV_PYTHON_INSTALL_DIR: /home/codespace/projects/.uv/python

    env_file: .env
    volumes:
      # Host mount for dynamic changes
      - ../:/home/codespace/o3s
      # Configuration for tools
      - o3s-config:/home/codespace/config
      # Volume mount for project to work with across sessions
      - o3s-data:/home/codespace/projects
    # Limit ressource usage
    deploy:
      resources:
        limits:
          memory: ${MEMORY_LIMIT}
          cpus: ${CPU_LIMIT}
        #reservations:
        #  devices:
        #    - driver: nvidia
        #      count: all
        #      capabilities: [gpu]
    # Required by Docker-in-Docker
    cap_add:
      - NET_ADMIN
    # Route egress through the gateway at container start and  keep the container alive.
    command: bash -c 'sudo ip route replace default via "$$GATEWAY_IP" || true; exec sleep infinity'
    # Its sole exit is the gateway
    networks:
      - cage
    # Wait until the gateway is routing before this container starts
    depends_on:
      gateway:
        condition: service_healthy
    # Resolve through the gateway's dnsmasq (this populates the allowlist)
    dns:
      - *gateway_ip

networks:
  # Only the gateway (which NATs via its own egress interface) can reach the internet
  cage:
    name: o3s-cage
    driver: bridge
    driver_opts:
      com.docker.network.bridge.enable_ip_masquerade: "false"
    ipam:
      config:
        - subnet: *cage_subnet
  # Gateway's own path to the internet
  egress:
    name: o3s-egress

volumes:
  o3s-config:
    name: o3s-config
  o3s-data:
    name: o3s-data
